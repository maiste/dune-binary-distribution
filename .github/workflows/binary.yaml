name: Binaries

on:
  push:
    branches:
      - "actions/build-from-local"

jobs:
  binary:
    name: Create
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: macos-13
          #   name: mac-intel
          #   installable: .#
          # - os: macos-14
          #   name: mac-arm
          #   installable: .#
          - os: ubuntu-22.04
            name: x86_64-unknow-linux-musl
            installable: .#dune-static
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ocaml/dune
          ref: toolchains
          fetch-depth: 0 # for git describe
      - uses: cachix/install-nix-action@v22
      - run: echo "(version $(git describe --always --dirty --abbrev=7))" >> dune-project
      - run: nix build ${{ matrix.installable }}
      - uses: actions/upload-artifact@v4
        with:
          path: result/bin/dune
          name: ${{ matrix.name }}
  deploy-s3:
    runs-on: ubuntu-latest
    needs: binary
    steps:
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: rclone
          version: 1.0

      - name: Checkout Tree
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"

      - name: Install Sandworm
        run: cd sandworm && opam install -y . --deps-only && opam exec  -- dune build

      - uses: actions/download-artifact@v4
        with:
          path: ~/artifacts

      - name: Import artifacts
        run: mv "/home/runner/artifacts" "."

      - name: Export rclone config
        run: echo "${{ secrets.RCLONE_CONF }}" >> rclone.conf

      - name: Export and build html
        run: ./sandworm/_build/install/default/bin/sandworm

      - name: Commit changes
        run: |
          git config --global user.name 'Sandworm'
          git config --global user.email 'tarides@users.noreply.github.com'
          git add index.html metadata.json
          git commit -m "Nightly build $(date +'%Y-%m-%d')"
          git push


