name: Binaries

on:
  push:
    branches:
      - "actions/build-from-local"

jobs:
  binary:
    name: Create
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: macos-13
          #   name: mac-intel
          #   installable: .#
          # - os: macos-14
          #   name: mac-arm
          #   installable: .#
          - os: ubuntu-22.04
            name: linux-intel-static
            installable: .#dune-static
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ocaml/dune
          ref: toolchains
          fetch-depth: 0 # for git describe
      - uses: cachix/install-nix-action@v22
      - run: echo "(version $(git describe --always --dirty --abbrev=7))" >> dune-project
      - run: nix build ${{ matrix.installable }}
      - uses: actions/upload-artifact@v4
        with:
          path: result/bin/dune
          name: dune-${{ matrix.name }}
  deploy-s3:
    runs-on: ubuntu-latest
    needs: binary
    steps:
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: rclone
          version: 1.0
      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: ~/artifacts
      - name: "Import artifacts"
        run: mv "/home/runner/artifacts" "."
      - name: "Export rclone config"
        run: echo "${{ secrets.RCLONE_CONF }}" >> rclone.conf
      - name: "LS"
        run: ls -R
      - name: "Export artifacts to S3"
        run: rclone copy -v --config="./rclone.conf" ./artifacts scaleway:dune-binary-distribution/${{ steps.date.outputs.DATE }}

